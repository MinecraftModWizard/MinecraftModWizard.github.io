<!DOCTYPE html>
<html>
    <head>
        <title>Minecraft Mod Wizard</title>
        <link rel="stylesheet" href="./main.css">
        <link rel="icon" href="./images/favicon.png">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    </head> 
    <body>
        <div id="setup">
            <p>Welcome to Minecraft Mod Wizard!</p>
            <p>Please enter info about the mod you want to make!</p>
            <div class="horizontal">
                <p style="padding-right: 10px;">Mod Name:</p>
                <input type="text" id="modname">
            </div>
            <div class="horizontal">
                <p style="padding-right: 10px;">Mod Description:</p>
                <input type="text" id="moddesc">
            </div>
            <button id="makeModButton">Confirm</button>
        </div>
        <div id="optionBar" hidden>
            <img src="./images/DownloadMod.png" id="downloadMod">
            <img src="./images/AddElement.png" id="addElement">
        </div>
        <div id="elementList" hidden>
            <p>Add New Element</p>
            <div class="horizontal itemType" id="addItem">
                <img src="./images/item.png">
                <p>Item</p>
            </div>
        </div>
        <div id="textureEditor" hidden>
            <p>Make texture</p>
            <canvas id="textureCanvas" width="16" height="16"></canvas>
            <input id="textureColor" type="color">
            <button id="confirmTexture">Confirm</button>
        </div>
        <div id="itemEditor" hidden>
            <p>Make item</p>
            <img src="./images/missingTexture.png" id="itemTexturePreview">
            <div class="horizontal">
                <p>Name:</p>
                <input type="text" id="itemName">
            </div>
            <button id="saveItem">Save</button>
        </div>
        <script src="./main.js"></script>
    </body>
</html>
